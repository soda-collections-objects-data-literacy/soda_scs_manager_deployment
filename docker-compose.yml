#todo use label mappings

services:

  # SCS Manager
  scs--portainer:
    image: portainer/portainer-ce:2.33.6
    container_name: scs--portainer
    command: -H unix:///var/run/docker.sock
    volumes:
      - scs--portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - scs--reverse-proxy
    networks:
      - reverse-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=reverse-proxy"
      - "traefik.http.routers.scs--portainer.rule=Host(`${SCS_PORTAINER_DOMAIN}`)"
      - "traefik.http.routers.scs--portainer.entrypoints=web,websecure"
      - "traefik.http.routers.scs--portainer.tls=true"
      - "traefik.http.routers.scs--portainer.tls.certresolver=le"
      - "traefik.http.services.scs--portainer.loadbalancer.server.port=9000"
      - "traefik.http.routers.scs--portainer.service=scs--portainer"
      - "traefik.http.routers.scs--portainer-edge.rule=Host(`${SCS_PORTAINER_EDGE_DOMAIN}`)"
      - "traefik.http.routers.scs--portainer-edge.entrypoints=web,websecure"
      - "traefik.http.services.scs--portainer-edge.loadbalancer.server.port=8000"
      - "traefik.http.routers.scs--portainer-edge.service=scs--portainer"
    restart: unless-stopped

  # SQL database
  scs--database:
    image: mariadb:11.5.2
    container_name: scs--database
    command: >
      --transaction-isolation=READ-COMMITTED
      --innodb-buffer-pool-size=8G
      --innodb-buffer-pool-instances=16
      --innodb-log-file-size=1G
      --innodb-log-buffer-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --innodb-file-per-table=1
      --innodb-read-io-threads=8
      --innodb-write-io-threads=8
      --innodb-io-capacity=4000
      --innodb-io-capacity-max=8000
      --innodb-purge-threads=8
      --innodb-page-cleaners=8
      --innodb-adaptive-hash-index=1
      --innodb-change-buffering=all
      --max-connections=1000
      --max-user-connections=900
      --table-open-cache=16000
      --table-definition-cache=8000
      --thread-cache-size=200
      --tmp-table-size=256M
      --max-heap-table-size=256M
      --join-buffer-size=16M
      --sort-buffer-size=16M
      --read-buffer-size=4M
      --read-rnd-buffer-size=8M
      --binlog-cache-size=4M
      --max-binlog-size=512M
      --expire-logs-days=7
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow-query.log
      --long-query-time=2
      --log-queries-not-using-indexes=1
      --log-slow-admin-statements=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-allowed-packet=128M
      --wait-timeout=600
      --interactive-timeout=600
      --net-read-timeout=60
      --net-write-timeout=60
      --back-log=500
      --thread-stack=512K
    environment:
      MYSQL_ROOT_PASSWORD: ${SCS_DB_ROOT_PASSWORD}
    volumes:
      - scs--database-data:/var/lib/mysql
      - /srv/backups/scs-manager/snapshots:/var/scs-manager/snapshots
    depends_on:
      - scs--reverse-proxy
      - scs--portainer
    networks:
      - reverse-proxy
    labels:
      - "traefik.enable=false"
    restart: unless-stopped

  scs--phpmyadmin:
    image: phpmyadmin:latest
    container_name: scs--phpmyadmin
    restart: unless-stopped
    environment:
      - PMA_HOST=${SCS_DBMS_DEFAULT_SERVER:-scs--database}
      - PMA_ABSOLUTE_URI=https://dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}/
      # phpMyAdmin configuration storage (pmadb) control user
      - SCS_DBMS_PMA_PASSWORD=${SCS_DBMS_PMA_PASSWORD:-}
      # Keycloak logout — build URL in compose so ${SCS_SUBDOMAIN} etc. expand ( .env does not)
      - KC_LOGOUT_BASE=https://${KC_SERVICE_NAME:-auth}.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}
      - KC_REALM=${KC_REALM:-scs-dev}
      # Built in compose so ${SCS_SUBDOMAIN} expands. Override with SCS_DBMS_DOMAIN_PMA if custom.
      - SCS_DBMS_DOMAIN_PMA=${SCS_DBMS_DOMAIN_PMA:-dbms.${SCS_SUBDOMAIN}.${SCS_BASE_DOMAIN}}
      # Redirect to manager after logout (not back to phpMyAdmin)
      - SCS_MANAGER_DOMAIN_PMA=manager.${SCS_SUBDOMAIN}.${SCS_BASE_DOMAIN}
    volumes:
      - ./config/phpmyadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
      - ./config/phpmyadmin/signon-script.php:/var/www/html/signon-script.php:ro
      - ./config/phpmyadmin/signon.php:/var/www/html/signon.php:ro
    depends_on:
      - scs--database
      - scs--reverse-proxy
    networks:
      - reverse-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=reverse-proxy"
      # Handle ALL paths including /_oauth (callback detected via X-Forwarded-Uri by mesosphere fork)
      - "traefik.http.routers.scs--phpmyadmin.rule=Host(`dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.scs--phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.scs--phpmyadmin.middlewares=dbms-sso"
      - "traefik.http.routers.scs--phpmyadmin.tls=true"
      - "traefik.http.routers.scs--phpmyadmin.tls.certresolver=le"
      - "traefik.http.services.scs--phpmyadmin.loadbalancer.server.port=80"
      # /_oauth/logout: mesosphere forward-auth has no logout handler; use redirect+headers (no extra service)
      - "traefik.http.routers.scs--dbms-logout.rule=Host(`dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}`) && PathPrefix(`/_oauth/logout`)"
      - "traefik.http.routers.scs--dbms-logout.priority=100"
      - "traefik.http.routers.scs--dbms-logout.entrypoints=websecure"
      - "traefik.http.routers.scs--dbms-logout.middlewares=dbms-logout-headers,dbms-logout-redirect"
      - "traefik.http.routers.scs--dbms-logout.tls=true"
      - "traefik.http.routers.scs--dbms-logout.tls.certresolver=le"

  scs--forward-auth:
    image: mesosphere/traefik-forward-auth:3.1.0
    container_name: scs--forward-auth
    restart: unless-stopped
    # Map Keycloak domain to host so token exchange reaches Traefik (avoids hairpin NAT)
    extra_hosts:
      - "auth.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}:host-gateway"
    environment:
      - CLIENT_ID=https://dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}
      - CLIENT_SECRET=${SCS_DBMS_CLIENT_SECRET}
      - ENCRYPTION_KEY=${SCS_DBMS_FORWARD_AUTH_ENCRYPTION_KEY}
      - SECRET=${SCS_DBMS_FORWARD_AUTH_SECRET}
      - PROVIDER_URI=https://auth.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}/realms/${KC_REALM:-scs-dev}
      - AUTH_HOST=dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}
      # No leading dot - forward-auth adds it internally (double dot causes cookie mismatch)
      - COOKIE_DOMAIN=dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}
      # Forward the raw ID token so signon.php can extract preferred_username from the JWT
      - FORWARD_TOKEN_HEADER_NAME=X-Auth-Token
      # After clearing cookie, redirect to Keycloak logout then to manager
      - LOGOUT_REDIRECT=https://auth.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}/realms/${KC_REALM:-scs-dev}/protocol/openid-connect/logout?client_id=https%3A%2F%2Fdbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}&post_logout_redirect_uri=https%3A%2F%2Fmanager.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}%2F
      - LOG_LEVEL=debug
    depends_on:
      - scs--reverse-proxy
    networks:
      - reverse-proxy
    labels:
      # forward-auth is only used as a middleware target (not a Traefik router endpoint).
      # Traefik calls http://scs--forward-auth:4181 internally via dbms-sso middleware,
      # passing X-Forwarded-Uri so mesosphere fork can detect /_oauth callbacks correctly.
      - "traefik.enable=false"

  # Whoami for debugging routing + proxy-header stuff
  scs--echo:
    image: traefik/whoami
    container_name: scs--echo
    networks:
      - reverse-proxy
    labels:
      - "traefik.enable=false"
      - "traefik.http.routers.scs--echo.rule=Host(`echo.${SCS_SUBDOMAIN}.${SCS_BASE_DOMAIN}`)"
      - "traefik.http.routers.scs--echo.entrypoints=websecure"
      - "traefik.http.routers.scs--echo.tls=true"
      - "traefik.http.routers.scs--echo.tls.certresolver=le"
      - "traefik.http.services.scs--echo.loadbalancer.server.port=80"
    restart: unless-stopped

  # Traefik
  scs--reverse-proxy:
    image: traefik:3.6
    container_name: scs--reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - reverse-proxy
    labels:
      - "traefik.enable=true"
      # - "traefik.docker.network=reverse-proxy"  this should not be needed.

      # Middlewares
      ## Basic Auth
      - "traefik.http.middlewares.admin-auth.basicauth.users=${SCS_TRAEFIK_USERNAME}:${SCS_TRAEFIK_HASHED_PASSWORD}"

      ## DBMS SSO (Keycloak forward auth)
      - "traefik.http.middlewares.dbms-sso.forwardauth.address=http://scs--forward-auth:4181"
      - "traefik.http.middlewares.dbms-sso.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.dbms-sso.forwardauth.authResponseHeaders=X-Forwarded-User,X-Auth-Token"

      ## DBMS logout: clear forward-auth cookie + redirect to Keycloak (mesosphere fork has no /_oauth/logout)
      - "traefik.http.middlewares.dbms-logout-headers.headers.customResponseHeaders.Set-Cookie=_forward_auth=; Path=/; Domain=dbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}; Max-Age=0; HttpOnly; Secure; SameSite=Lax"
      - "traefik.http.middlewares.dbms-logout-redirect.redirectregex.regex=^https?://[^/]+/_oauth/logout.*"
      - "traefik.http.middlewares.dbms-logout-redirect.redirectregex.replacement=https://auth.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}/realms/${KC_REALM:-scs-dev}/protocol/openid-connect/logout?client_id=https%3A%2F%2Fdbms.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}&post_logout_redirect_uri=https%3A%2F%2Fmanager.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}%2F"
      - "traefik.http.middlewares.dbms-logout-redirect.redirectregex.permanent=false"

      ## Redirect to SCS Manager
      - "traefik.http.middlewares.redirect-to-scs-manager--drupal.redirectregex.regex=^https?://${SCS_SUBDOMAIN}\\.${SCS_BASE_DOMAIN}(.*)"
      - "traefik.http.middlewares.redirect-to-scs-manager--drupal.redirectregex.replacement=https://${SCS_MANAGER_DOMAIN}$${1}"
      - "traefik.http.middlewares.redirect-to-scs-manager--drupal.redirectregex.permanent=true"

      ## Bot Protection Middlewares for Heavy Traffic Sites
      ## High-traffic rate limit: 300 requests per minute per IP (for main sites)
      ## To use: Add "rate-limit-high" to a service's middlewares list
      - "traefik.http.middlewares.rate-limit-high.ratelimit.average=300"
      - "traefik.http.middlewares.rate-limit-high.ratelimit.period=1m"
      - "traefik.http.middlewares.rate-limit-high.ratelimit.burst=100"
      ## Moderate rate limit: 150 requests per minute per IP (for APIs/services)
      ## To use: Add "rate-limit" to a service's middlewares list
      - "traefik.http.middlewares.rate-limit.ratelimit.average=150"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
      ## Stricter rate limit for aggressive bots: 60 requests per minute
      ## To use: Add "rate-limit-strict" to a service's middlewares list
      - "traefik.http.middlewares.rate-limit-strict.ratelimit.average=60"
      - "traefik.http.middlewares.rate-limit-strict.ratelimit.period=1m"
      - "traefik.http.middlewares.rate-limit-strict.ratelimit.burst=20"

      # Routers
      # Default hostname matches other services (e.g. manager.${SCS_SUBDOMAIN}.${SCS_BASE_DOMAIN}).
      # Set SCS_TRAEFIK_DOMAIN only if the dashboard must use a different host.
      - "traefik.http.routers.scs--reverse-proxy.rule=Host(`${SCS_TRAEFIK_DOMAIN:-reverse-proxy.${SCS_SUBDOMAIN:-scs}.${SCS_BASE_DOMAIN:-localhost}}`)"
      - "traefik.http.routers.scs--reverse-proxy.entrypoints=websecure"
      - "traefik.http.routers.scs--reverse-proxy.middlewares=admin-auth"
      - "traefik.http.routers.scs--reverse-proxy.tls=true"
      - "traefik.http.routers.scs--reverse-proxy.tls.certresolver=le"
      - "traefik.http.routers.scs--reverse-proxy.service=api@internal"
      ## Redirect router for scs.sammlungen.io -> manager.scs.sammlungen.io
      ## @todo check if this is the right place.
      - "traefik.http.routers.scs-manager-redirect.rule=Host(`${SCS_MANAGER_SECOND_DOMAIN}`)"
      - "traefik.http.routers.scs-manager-redirect.entrypoints=websecure"
      - "traefik.http.routers.scs-manager-redirect.middlewares=redirect-to-scs-manager--drupal"
      - "traefik.http.routers.scs-manager-redirect.tls=true"
      - "traefik.http.routers.scs-manager-redirect.tls.certresolver=le"

    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Named volume so acme.json is created with mode 600 (bind mounts often end up 644/755).
      # To import an existing host acme.json once:
      # docker compose run --rm -v "$(pwd)/acme.json:/import:ro" -v scs--reverse-proxy-certificates:/cert alpine sh -c "cp /import /cert/acme.json && chmod 600 /cert/acme.json"
      - scs--reverse-proxy-certificates:/certificates
    command:
      # Enable Docker provider
      - --providers.docker
      # Disable exposing services without Traefik labels
      - --providers.docker.exposedbydefault=false
      # Listen on port 80 for HTTP requests
      - --entrypoints.web.address=:80
      # Allow bypassing the ACME challenge at /.well-known/acme-challenge
      # Define a new router like this:
      # http_acme_passthough_my.domain:
      #   rule: "Host(`my.domain`) && PathPrefix(`/.well-known/acme-challenge/`)"
      #   entryPoints: ["web"]
      #   service: "proxy_https_my.domain"
      #   priority:  "43" # THIS IS IMPORTANT priority has to be > 42 otherwise this does not work.
      - --entrypoints.web.allowACMEByPass=true
      # Listen on port 443 for HTTPS requests
      - --entrypoints.websecure.address=:443
      # Http to https redirect
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.web.http.redirections.entryPoint.permanent=true
      - --entrypoints.web.http.redirections.entryPoint.priority=43
      # Use the specified email address for Let's Encrypt certificate requests
      - --certificatesresolvers.le.acme.email=${SCS_TRAEFIK_EMAIL:-admin@example.com}
      # TLS-ALPN-01 on websecure: avoids HTTP-01 being answered by app stacks behind Docker routers
      # (e.g. WissKI) after redirect to HTTPS. Do not set httpChallenge on the same resolver.
      - --certificatesresolvers.le.acme.tlschallenge=true
      # Use the specified storage location for Let's Encrypt certificates
      - --certificatesresolvers.le.acme.storage=/certificates/acme.json
      # Enable access log output
      - --accesslog
      # Enable general log output
      - --log
      # Enable the Traefik API
      - --api
      # Enable the Traefik API dashboard
      - --api.dashboard=true


volumes:
  scs--database-data:
    name: scs--database-data
  scs--portainer-data:
    name: scs--portainer-data
  scs--reverse-proxy-certificates:
    name: scs--reverse-proxy-certificates
  scs--shared-data:
    name: ${SCS_SHARED_DATA}

networks:
  reverse-proxy:
    name: reverse-proxy
    # If clients use IPv6 (AAAA DNS), enable on the live network — see docs/initial-setup/network-creation.md
    # enable_ipv6: true
    driver: bridge
    external: true
